services:
  db:
    image: postgres:15-alpine
    container_name: pms-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gatino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-753524}
      POSTGRES_DB: ${POSTGRES_DB:-studiobd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./apps/backend
    container_name: pms-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gatino:753524@db:5432/studiobd}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/static:/app/static

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: pms-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
