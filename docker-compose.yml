services:
  backend:
    build: ./apps/backend
    container_name: pms-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gatino:753524@204.48.22.217:5432/studiobd}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://206.189.191.143,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/static:/app/static

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: pms-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  # We can keep this or remove it, but it's not used anymore for postgres
  postgres_data:
